<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade2
    </title>
    
</head>
<body>
    <button id="mais" onclick="adicionar()"> Clique aqui</button>
    <button id="menos" onclick="diminuir()"> Nao clique aqui</button>
      <div id="Cliques"></div>

      
</body>
<script>
    let cliquesTotais = 0
    const msg = document.getElementById('Cliques')

    function adicionar(){
        cliquesTotais ++
        msg.innerHTML = `Numero total de cliques: <strong>${cliquesTotais}</strong> `
    }

    function diminuir(){
         cliquesTotais --
         msg.innerHTML = `Numero total de cliques: <strong>${cliquesTotais}</strong> `
    }
        
</script>
</html>
