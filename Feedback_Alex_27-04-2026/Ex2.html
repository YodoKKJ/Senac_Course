<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercio2</title>
</head>
<body>
    <input id="valor" type="number" placeholder="Qual o valor da sua compra? ">
    <button id="enviar" onclick="enviar()">Enviar</button>
    <div id="mensagem"></div>
    <script>

        

        function enviar(){
            const valor = document.getElementById("valor").value
            const mensagem = document.getElementById("mensagem")

            if (valor >= 100){
               mensagem.innerText = "Você ganhou desconto!"
            }
            else if (valor < 100){
                mensagem.innerText = "Compra sem desconto"
            }
            
                
        }
        

    </script>
</body>

</html>
