<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercio3</title>
</head>
<body>
    <input id="resposta" type="text" placeholder="Qual a palavra para passar? ">
    <button id="enviar" onclick="enviar()">Enviar</button>
    <div id="mensagem"></div>
    <script>

        

        function enviar(){
            const resposta = document.getElementById("resposta").value
            const mensagem = document.getElementById("mensagem")

            let minusculo = resposta.toLowerCase()

            if (minusculo.trim() === "fogo"){
               mensagem.innerText = "Palavra Secreta correta parabéns"
            }
           
            else{
                mensagem.innerText = "Resposta errada"
            }
            
                
        }
        

    </script>
</body>

</html>
